<div class="container" style="display: flex; justify-content: center; align-items: center; width: 100%; height: 100%;">
	<svg viewBox="-100 0 650 500" class="chocolate-svg svg">

		<g transform="translate(-190, 45) rotate(-20)" opacity="0.9">
			<path
				d="M250,100 C320,30 450,50 450,180 C450,330 250,460 250,460 C250,460 50,330 50,180 C50,50 180,30 250,100 Z"
				fill="#FFFBF5" stroke="#3E2723" stroke-width="4" />

			<path d="M120,60 L350,400" stroke="#3E2723" stroke-width="2" opacity="0.3" />
			<path d="M160,45 L390,380" stroke="#3E2723" stroke-width="2" opacity="0.3" />

			<circle cx="180" cy="110" r="15" fill="none" stroke="#3E2723" stroke-width="2" opacity="0.5" />
			<path d="M180,110 Q210,70 230,110 Q210,150 180,110" fill="none" stroke="#3E2723" stroke-width="1.5"
				opacity="0.5" />
			<path d="M180,110 Q140,70 120,110 Q140,150 180,110" fill="none" stroke="#3E2723" stroke-width="1.5"
				opacity="0.5" />
		</g>

		<g transform="translate(50, 0)">
			<path id="boxPath"
				d="M250,100 C320,30 450,50 450,180 C450,330 250,460 250,460 C250,460 50,330 50,180 C50,50 180,30 250,100 Z"
				fill="#FFFBF5" stroke="#3E2723" stroke-width="8" />

			@for (c of chocolates(); track c.id) {
			<g (click)="updateMood(c.id)" style="cursor: pointer;">
				<path [attr.d]="c.pts" [attr.fill]="c.color" stroke="#3E2723" stroke-width="2" class="candy-piece" />
				<text [attr.x]="c.cx" [attr.y]="c.cy" text-anchor="middle" class="day-label"
					style="font-family: sans-serif; font-size: 12px; font-weight: 900; pointer-events: none; fill: #3E2723;">
					{{ c.id }}
				</text>
			</g>
			}
		</g>
	</svg>
</div>
