<div class="container">
	<svg viewBox="0 0 400 600" class="april-svg" xmlns="http://www.w3.org/2000/svg">
		<defs>
			<clipPath id="umbrella-mask">
				<path d="M180,70 
					C300,60 375,160 375,275 
					Q340,280 275,310 
					L125,310 
					Q65,280 25,275 
					C25,160 100,60 220,70 Z" />
			</clipPath>
		</defs>

		<path d="M200,280 L200,480" stroke="#333" stroke-width="6" fill="none" stroke-linecap="round" />
		<path d="M200,480 Q200,550 150,550" stroke="#333" stroke-width="6" fill="none" stroke-linecap="round" />

		<g clip-path="url(#umbrella-mask)">
			@for (section of umbrellaSlices; track $index) {
			<g (click)="updateDay(section)" class="shard-group" style="cursor: pointer;">
				<path [attr.d]="section.path" [attr.fill]="section.color" stroke="#333" stroke-width="0.5"
					opacity="1" />
				<text [attr.x]="section.label.x" [attr.y]="section.label.y" text-anchor="middle" font-size="9"
					font-weight="bold" fill="#111" style="pointer-events: none; font-family: sans-serif;">
					{{ $index + 1 }}
				</text>
			</g>
			}
		</g>

		<path d="M180,70 
			C300,60 375,160 375,275 
			Q340,280 275,310 
			L125,310 
			Q65,280 25,275 
			C25,160 100,60 220,70 Z" fill="none" stroke="#111" stroke-width="3.5" stroke-linecap="round"
			stroke-linejoin="round" />
	</svg>
	<div class="legend-container">
		<app-mood-picker (moodColorSelected)="updateMood($event)" />
	</div>
</div>
