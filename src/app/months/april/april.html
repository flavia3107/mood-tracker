<div class="meadow-container">
	@for (item of aprilTulips(); track item.id) {
	<div class="tulip-plant" [style.margin]="'0 0.1rem'">
		<svg [attr.viewBox]="'0 0 100 ' + item.height" preserveAspectRatio="xMidYMax meet">
			<path [attr.d]="'M50,' + item.height + ' L50,40'" fill="none" stroke="#4ade80" stroke-width="3" />
			<path d="M50,150 Q70,120 50,90 Q40,120 50,150" fill="#4ade80" opacity="0.7" />

			<g [style.transform]="'translate(0, 0) rotate(' + item.rotation + 'deg)'"
				style="transform-origin: 50% 40px;">
				<path d="M50 90 C15 90 5 70 15 35 C20 15 35 15 45 30 L50 90 Z" [attr.fill]="item.color" />
				<path d="M50 90 C85 90 95 70 85 35 C80 15 65 15 55 30 L50 90 Z" fill="#e11d48" />
				<path d="M30 80 C30 50 40 10 50 10 C60 10 70 50 70 80 C70 95 30 95 30 80 Z" fill="#ffe4e6" />

				<text x="50" y="55" text-anchor="middle" font-weight="900" fill="#881337" font-size="16">
					{{ item.id }}
				</text>
			</g>
		</svg>
	</div>
	}
</div>
