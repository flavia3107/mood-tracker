<svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
	<path d="M25 155 Q 100 145, 175 155" stroke="#D1F2EB" stroke-width="4" fill="none" class="ground-line"
		opacity="0.5" />

	@for (s of shards; track $index) {
	<g [attr.transform]="'translate(' + s.x + ',' + s.y + ') rotate(' + s.tilt + ')'">
		<path class="ice-shard" [attr.d]="getShardPath(s.height, s.width)" [attr.fill]="getMoodColor($index)"
			stroke="white" stroke-width="0.3" />

		<path [attr.d]="'M 0 0 L 0 ' + -s.height + ' L ' + (-s.width/2) + ' ' + (-s.height*0.3) + ' Z'" fill="white"
			opacity="0.25" pointer-events="none" />
	</g>
	}

	<g transform="translate(180, 145) rotate(30)">
		<path class="ice-shard" [attr.d]="getShardPath(20, 6)" [attr.fill]="getMoodColor(30)" stroke="white"
			stroke-width="0.5" />
	</g>
</svg>
