<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
	<rect x="0" y="0" width="200" height="200" fill="none" stroke="#1e293b" stroke-width="10" />

	<path d="M20 20 L 170 170" stroke="white" stroke-width="0.5" opacity="0.3" class="spine" fill="none" />

	@for (cell of frostCells; track $index) {
	<g
		[attr.transform]="'translate(' + cell.x + ',' + cell.y + ') rotate(' + cell.angle + ') scale(' + cell.scale + ')'">
		<path class="frost-shard" d="M 0 0 L 12 -8 L 24 0 L 12 8 Z" [attr.fill]="getMoodColor($index)" />

		<path d="M 0 0 L 20 0" stroke="white" stroke-width="0.2" opacity="0.5" pointer-events="none" />
	</g>
	}

	<g transform="translate(40, 160) scale(0.8)">
		@for (i of [0, 60, 120, 180, 240, 300]; track $index) {
		<path [attr.transform]="'rotate(' + i + ')'" d="M 0 0 L 8 -4 L 16 0 L 8 4 Z" [attr.fill]="getMoodColor(30)"
			opacity="0.8" />
		}
	</g>
</svg>
