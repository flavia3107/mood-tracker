<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
	<ellipse cx="100" cy="170" rx="90" ry="20" fill="#E0F2F1" opacity="0.4" class="ice-base" />

	@for (c of clusters; track $index) {
	<g [attr.transform]="'translate(' + c.x + ',' + c.y + ') scale(' + c.scale + ')'">
		@for (i of [].constructor(c.count); track $index; let shardIdx = $index) {
		<g [attr.transform]="'rotate(' + (shardIdx * 25 - 60) + ')'">
			<path class="crystal" [attr.d]="getShardPath(40 + shardIdx * 5, 10)"
				[attr.fill]="getMoodColor(c.start + shardIdx)" stroke="#FFFFFF" stroke-width="0.5" />

			<path [attr.d]="'M 0 0 L 2 ' + -(40 + shardIdx * 5) + ' L ' + 5 + ' ' + -(40 + shardIdx * 5)/3 + ' Z'"
				fill="white" opacity="0.3" pointer-events="none" />
		</g>
		}
	</g>
	}

	<g transform="translate(170, 180) rotate(110)">
		<path class="crystal" [attr.d]="getShardPath(25, 8)" [attr.fill]="getMoodColor(30)" stroke="#FFFFFF"
			stroke-width="0.5" />
	</g>
</svg>
