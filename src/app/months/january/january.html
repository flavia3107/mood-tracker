<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
	<defs>
		<linearGradient id="iceReflect" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" style="stop-color:white; stop-opacity:0.4" />
			<stop offset="50%" style="stop-color:white; stop-opacity:0" />
			<stop offset="100%" style="stop-color:white; stop-opacity:0.1" />
		</linearGradient>
	</defs>

	<circle cx="100" cy="180" r="60" fill="#ADE8F4" opacity="0.2" filter="blur(20px)" />

	<g transform="translate(100, 185)">
		@for (shard of shards; track $index) {
		<g [attr.transform]="'rotate(' + shard.angle + ')'">
			<path class="ice-shard" [attr.d]="getShardPath(shard.length, shard.width)"
				[attr.fill]="getMoodColor($index)" stroke="white" stroke-width="0.5" />
			<path d="M 0 0 L 0 -shard.length L -shard.width/2 -shard.length/2 Z" fill="url(#iceReflect)"
				pointer-events="none" />
		</g>
		}
	</g>

	<g transform="translate(30, 170) rotate(-15)">
		<path class="ice-shard" [attr.d]="getShardPath(40, 10)" [attr.fill]="getMoodColor(30)" stroke="white"
			stroke-width="0.5" />
		<circle cx="0" cy="-40" r="1" fill="white" class="glimmer" />
	</g>

	<path d="M20 185 Q 100 175, 180 185 L 180 200 L 20 200 Z" fill="#E0F2F1" opacity="0.6" />
</svg>
