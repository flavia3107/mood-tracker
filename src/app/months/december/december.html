		<circle [attr.r]="d.r" [attr.fill]="getMoodColor(i)" />

		<path

			fill="none" stroke="white" stroke-width="0.7" stroke-linecap="round" opacity="0.6" />

	}

	<g transform="translate(100, 18) scale(1.1)">
