<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="background: #121212; border-radius: 8px;">
	<path [attr.d]="lightWirePath" fill="none" stroke="#333" stroke-width="1.2" stroke-linecap="round" />

	@for (d of decorations; track $index; let i = $index) {
	<g [attr.transform]="'translate(' + d.x + ',' + d.y + ')'">
		<rect x="-1.5" y="-3" width="3" height="3" fill="#444" rx="0.5" />

		<circle [attr.r]="d.r + 1.5" [attr.fill]="getMoodColor(i)" opacity="0.15" />

		<circle [attr.r]="d.r" [attr.fill]="getMoodColor(i)" />

		<path
			[attr.d]="'M ' + (-d.r * 0.4) + ' ' + (-d.r * 0.2) + ' A ' + (d.r * 0.4) + ' ' + (d.r * 0.4) + ' 0 0 1 ' + (d.r * 0.2) + ' ' + (-d.r * 0.4)"
			fill="none" stroke="white" stroke-width="0.6" stroke-linecap="round" opacity="0.5" />
	</g>
	}
</svg>
