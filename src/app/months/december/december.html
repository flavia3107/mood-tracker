<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
	<rect x="94" y="175" width="12" height="15" fill="#4a2c2a" />

	<g stroke-linejoin="round">
		<path d="M100 25 L135 75 L65 75 Z" fill="#2E7D32" />
		<path d="M100 55 L155 125 L45 125 Z" fill="#1B5E20" />
		<path d="M100 95 L180 180 L20 180 Z" fill="#0A3D11" />
	</g>

	<g transform="translate(100, 18) scale(1.2)">
		<polygon points="0,-10 2.5,-3 10,-3 4,2 6,9 0,5 -6,9 -4,2 -10,-3 -2.5,-3" fill="#FFD700" stroke="#F9A825"
			stroke-width="0.5" />
		<circle r="2" fill="white" opacity="0.4" filter="blur(2px)" />
	</g>

	<path [attr.d]="'M' + decorations[0].x + ' ' + decorations[0].y + 
					decorations.slice(1).map(d => ' L' + d.x + ' ' + d.y).join('')" fill="none" stroke="#052107" stroke-width="0.5"
		opacity="0.6" />

	@for (d of decorations; track $index; let i = $index) {
	<g class="bulb" [attr.transform]="'translate(' + d.x + ',' + d.y + ')'">

		@if (monthData[i] === 'great' || monthData[i] === 'good') {
		<circle r="6" [attr.fill]="getMoodColor(i)" opacity="0.2" class="twinkle" />
		}

		<circle [attr.r]="d.r" [attr.fill]="getMoodColor(i)" stroke="white" stroke-width="0.2" />

		@if (d.isOrnament) {
		<rect x="-1.5" [attr.y]="-d.r - 1" width="3" height="2" fill="#9e9e9e" />
		}

		<path
			[attr.d]="'M ' + (-d.r/2) + ' ' + (-d.r/2) + ' A ' + d.r + ' ' + d.r + ' 0 0 1 ' + (d.r/2) + ' ' + (-d.r/2)"
			fill="none" stroke="white" stroke-width="0.5" opacity="0.4" pointer-events="none" />
	</g>
	}
</svg>
