<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
	<rect x="94" y="175" width="12" height="15" fill="#4a2c2a" />

	<g stroke-linejoin="round" stroke-linecap="round">
		<path d="M100 95 
                 Q140 135 180 180 
                 L160 175 L140 182 L120 175 L100 182 L80 175 L60 182 L40 175 L20 180 
                 Q60 135 100 95 Z" fill="#0A3D11" stroke="#052107" stroke-width="1" />

		<path d="M100 55 
                 Q130 90 155 125 
                 L130 120 L100 128 L70 120 L45 125 
                 Q70 90 100 55 Z" fill="#1B5E20" stroke="#052107" stroke-width="1" />

		<path d="M100 25 
                 Q120 50 135 75 
                 L115 70 L100 78 L85 70 L65 75 
                 Q80 50 100 25 Z" fill="#2E7D32" stroke="#052107" stroke-width="1" />
	</g>

	<g transform="translate(100, 18) scale(1.2)">
		<polygon points="0,-10 2.5,-3 10,-3 4,2 6,9 0,5 -6,9 -4,2 -10,-3 -2.5,-3" fill="#FFD700" stroke="#F9A825"
			stroke-width="0.5" />
	</g>

	<path [attr.d]="'M' + decorations[0].x + ' ' + decorations[0].y + 
                    decorations.slice(1).map(d => ' L' + d.x + ' ' + d.y).join('')" fill="none" stroke="#052107"
		stroke-width="0.3" opacity="0.4" />

	@for (d of decorations; track $index; let i = $index) {
	<g [attr.transform]="'translate(' + d.x + ',' + d.y + ')'">
		@if (monthData[i] === 'great' || monthData[i] === 'good') {
		<circle r="5" [attr.fill]="getMoodColor(i)" opacity="0.2" />
		}
		<circle [attr.r]="d.r" [attr.fill]="getMoodColor(i)" stroke="white" stroke-width="0.2" />
	</g>
	}
</svg>
