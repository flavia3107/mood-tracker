<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" style="background: #111111;">
	<defs>
		<radialGradient id="haloGradient" cx="50%" cy="50%" r="50%">
			<stop offset="0%" stop-color="#3E2723" stop-opacity="0.6" />
			<stop offset="100%" stop-color="#111111" stop-opacity="0" />
		</radialGradient>

		<radialGradient id="mercuryGlass" cx="30%" cy="30%" r="50%">
			<stop offset="0%" stop-color="white" stop-opacity="0.2" />
			<stop offset="100%" stop-color="black" stop-opacity="0.1" />
		</radialGradient>

		<symbol id="4pt-star" viewBox="0 0 10 10">
			<path d="M 5 0 L 6.5 3.5 L 10 5 L 6.5 6.5 L 5 10 L 3.5 6.5 L 0 5 L 3.5 3.5 Z" />
		</symbol>
		<symbol id="8pt-star" viewBox="0 0 10 10">
			<path
				d="M 5 0 L 5.5 3.5 L 8.5 1.5 L 6.5 4.5 L 10 5 L 6.5 5.5 L 8.5 8.5 L 5.5 6.5 L 5 10 L 4.5 6.5 L 1.5 8.5 L 3.5 5.5 L 0 5 L 3.5 4.5 L 1.5 1.5 L 4.5 3.5 Z" />
		</symbol>
	</defs>

	<circle cx="100" cy="110" r="100" fill="url(#haloGradient)" />

	<path d="M100 25 L135 75 L65 75 Z" fill="#2E7D32" />
	<path d="M100 55 L155 125 L45 125 Z" fill="#1B5E20" />
	<path d="M100 95 L180 180 L20 180 Z" fill="#0D3B11" />
	<path d="M100 12 L103 19 L111 19 L105 24 L107 31 L100 27 L93 31 L95 24 L89 19 L97 19 Z" fill="#FFEB3B"
		stroke="white" stroke-width="0.3" />

	@for (s of sparkles; track $index) {
	<use [attr.xlink:href]="s.type === '8pt' ? '#8pt-star' : '#4pt-star'" [attr.x]="s.x - 3" [attr.y]="s.y - 3"
		width="6" height="6" class="sparkle" />
	}

	@for (o of ornaments; track $index; let i = $index) {
	<g class="ornament">
		<circle [attr.cx]="o.x" [attr.cy]="o.y" [attr.r]="o.r" [attr.fill]="getMoodColor(i)" />
		<circle [attr.cx]="o.x" [attr.cy]="o.y" [attr.r]="o.r" fill="url(#mercuryGlass)" stroke="white"
			stroke-width="0.2" opacity="0.6" />
	</g>
	}

	<g transform="translate(65, 185) scale(0.9)">
		<rect width="25" height="15" fill="#8B0000" rx="1" />
		<path d="M 0 5 L 25 5 L 25 10 L 0 10 Z" fill="#FFD700" />
		<rect x="10" width="5" height="15" fill="#FFD700" />
		<path d="M 12.5 -3 L 15.5 2 L 12.5 7 L 9.5 2 Z" fill="#FFD700" rx="0.5" />
	</g>
	<g transform="translate(100, 192) scale(0.9)">
		<rect width="20" height="18" fill="#004D00" rx="1" />
		<rect x="8" width="4" height="18" fill="white" />
		<path d="M 10 -2 L 13 3 L 10 7 L 7 3 Z" fill="white" rx="0.5" />
	</g>
	<g transform="translate(130, 188) scale(0.9)">
		<rect width="22" height="15" fill="#003366" rx="1" />
		<rect x="9" width="4" height="15" fill="white" />
		<path d="M 11 -3 L 14 2 L 11 7 L 8 2 Z" fill="white" rx="0.5" />
	</g>
</svg>
