<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" style="background: #121212;">
	<defs>
		<radialGradient id="backGlow" cx="50%" cy="50%" r="50%">
			<stop offset="0%" stop-color="#3E2723" stop-opacity="0.6" />
			<stop offset="100%" stop-color="#121212" stop-opacity="0" />
		</radialGradient>

		<radialGradient id="glassShine" cx="30%" cy="30%" r="50%">
			<stop offset="0%" stop-color="white" stop-opacity="0.4" />
			<stop offset="100%" stop-color="black" stop-opacity="0.1" />
		</radialGradient>
	</defs>

	<circle cx="100" cy="100" r="100" fill="url(#backGlow)" />

	@for (s of sparkles; track $index) {
	<circle class="sparkle" [attr.cx]="s.x" [attr.cy]="s.y" [attr.r]="s.r" fill="white"
		[style.animation-delay]="s.delay + 's'" opacity="0.5" />
	}

	<rect x="94" y="180" width="12" height="15" fill="#3E2723" />
	<path d="M100 30 L135 80 L65 80 Z" fill="#2E7D32" />
	<path d="M100 65 L155 130 L45 130 Z" fill="#1B5E20" />
	<path d="M100 100 L180 190 L20 190 Z" fill="#0D3B11" /> @for (o of ornaments; track $index; let i = $index) {
	<g class="ornament">
		<circle [attr.cx]="o.x" [attr.cy]="o.y" [attr.r]="o.r" [attr.fill]="getMoodColor(i)"
			stroke="rgba(255,255,255,0.2)" stroke-width="0.5" />
		<circle [attr.cx]="o.x" [attr.cy]="o.y" [attr.r]="o.r" fill="url(#glassShine)" />
	</g>
	}

	<path d="M100 15 L104 25 L114 25 L106 31 L109 41 L100 35 L91 41 L94 31 L86 25 L96 25 Z" fill="#FFD700"
		stroke="#FFF176" stroke-width="0.5" />

	<g transform="translate(60, 195)">
		<rect width="22" height="16" fill="#B71C1C" rx="1" />
		<rect x="9" width="4" height="16" fill="#FDD835" />
		<rect y="6" width="22" height="4" fill="#FDD835" />
	</g>
	<g transform="translate(118, 198)">
		<rect width="18" height="12" fill="#0D47A1" rx="1" />
		<rect x="7" width="4" height="12" fill="white" />
	</g>
	<g transform="translate(90, 202)">
		<rect width="25" height="14" fill="#1B5E20" rx="1" />
		<rect x="10" width="5" height="14" fill="#F5F5F5" />
	</g>
</svg>
