<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
	<radialGradient id="treeGlow" cx="50%" cy="50%" r="50%">
		<stop offset="0%" stop-color="#334155" stop-opacity="0.4" />
		<stop offset="100%" stop-color="#0F172A" stop-opacity="0" />
	</radialGradient>
	<circle cx="100" cy="100" r="80" fill="url(#treeGlow)" />

	<rect x="94" y="180" width="12" height="15" fill="#422006" />
	<path d="M100 30 L140 85 L60 85 Z" fill="#14532D" />
	<path d="M100 65 L165 135 L35 135 Z" fill="#14532D" />
	<path d="M100 105 L185 190 L15 190 Z" fill="#064E3B" />

	@for (l of staticLights; track $index) {
	<circle [attr.cx]="l.x" [attr.cy]="l.y" [attr.r]="l.r" fill="#FEF3C7" class="static-light" />
	}

	@for (o of ornaments; track $index; let i = $index) {
	<g class="ornament" [attr.transform]="'translate(' + o.x + ',' + o.y + ')'">
		@switch (o.shape) {
		@case ('circle') {
		<circle r="4" [attr.fill]="getMoodColor(i)" stroke="white" stroke-width="0.3" />
		}
		@case ('teardrop') {
		<path d="M 0 -5 C 3 -2 3 2 0 4 C -3 2 -3 -2 0 -5" [attr.fill]="getMoodColor(i)" stroke="white"
			stroke-width="0.3" />
		}
		@case ('star') {
		<path d="M 0 -4 L 1 -1 L 4 -1 L 2 1 L 3 4 L 0 2 L -3 4 L -2 1 L -4 -1 L -1 -1 Z" [attr.fill]="getMoodColor(i)"
			stroke="white" stroke-width="0.3" transform="scale(1.2)" />
		}
		}
		<line x1="0" y1="-4" x2="0" y2="-8" stroke="#94A3B8" stroke-width="0.2" />
	</g>
	}

	<path d="M100 15 L103 23 L112 23 L105 29 L108 38 L100 33 L92 38 L95 29 L88 23 L97 23 Z" fill="#FDE047"
		stroke="white" stroke-width="0.5" />

	<g transform="translate(65, 195)">
		<rect width="18" height="14" fill="#B91C1C" rx="1" />
		<rect x="7" width="4" height="14" fill="#FDE047" />
	</g>
	<g transform="translate(115, 192)">
		<rect width="22" height="18" fill="#1D4ED8" rx="1" />
		<rect x="9" width="4" height="18" fill="white" />
	</g>
</svg>
