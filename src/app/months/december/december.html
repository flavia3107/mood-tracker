<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="background: #141414; border-radius: 4px;">
	<line x1="0" y1="20" x2="200" y2="20" stroke="#222" stroke-width="0.5" />
	<line x1="0" y1="180" x2="200" y2="180" stroke="#222" stroke-width="0.5" />

	<path [attr.d]="lightWirePath" fill="none" stroke="#2a2a2a" stroke-width="1" />

	@for (d of decorations; track $index; let i = $index) {
	<g [attr.transform]="'translate(' + d.x + ',' + d.y + ')'">
		<circle r="5" [attr.fill]="getMoodColor(i)" opacity="0.2">
			<animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" [attr.begin]="i*0.1 + 's'"
				repeatCount="indefinite" />
		</circle>

		<path d="M 0 0 C -1.5 0, -2.5 3.5, 0 5.5 C 2.5 3.5, 1.5 0, 0 0" [attr.fill]="getMoodColor(i)" />

		<rect x="-0.8" y="-1.5" width="1.6" height="2" fill="#333" />
	</g>
	}
</svg>
