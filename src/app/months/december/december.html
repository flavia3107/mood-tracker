<svg viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"
	style="background: #1a1a2e; border-radius: 8px;">
	<defs>
		<linearGradient id="wallGradient" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" stop-color="#2c3e50" stop-opacity="1" />
			<stop offset="100%" stop-color="#1c1c3c" stop-opacity="1" />
		</linearGradient>

		<radialGradient id="hallwayGlow" cx="50%" cy="40%" r="70%">
			<stop offset="0%" stop-color="#3d2c1c" stop-opacity="0.6" />
			<stop offset="100%" stop-color="#1a1a2e" stop-opacity="0" />
		</radialGradient>

		<filter id="bgBlur">
			<feGaussianBlur in="SourceGraphic" stdDeviation="1.5" />
		</filter>
	</defs>

	<rect width="200" height="200" fill="url(#wallGradient)" />

	<g filter="url(#bgBlur)" opacity="0.35">
		<circle cx="30" cy="40" r="10" fill="#cc3333" />
		<circle cx="160" cy="60" r="12" fill="#d4af37" />
		<circle cx="90" cy="140" r="9" fill="#2980b9" />
		<circle cx="50" cy="110" r="11" fill="#27ae60" />
		<circle cx="140" cy="150" r="8" fill="#cc3333" />
		<circle cx="60" cy="180" r="10" fill="#d4af37" />
		<circle cx="170" cy="120" r="9" fill="#2980b9" />
	</g>

	<path [attr.d]="lightWirePath" fill="none" stroke="#cdcdcd" stroke-width="0.2" stroke-linecap="round" />

	@for (d of decorations; track $index; let i = $index) {
	<g class="bulb" [attr.transform]="'translate(' + d.x + ',' + d.y + ')'">
		<path d="M 0 0 C -1.5 0, -2.5 3.5, 0 5.5 C 2.5 3.5, 1.5 0, 0 0" [attr.fill]="getMoodColor(i)" />
		<rect x="-0.8" y="-1.5" width="1.6" height="2" fill="#333" />
	</g>
	}
</svg>
