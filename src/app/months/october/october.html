<div class="tracker-container">
	<svg viewBox="0 0 450 400" class="glass-pumpkin-svg svg">
		<path d="M225,55 
     C240,40 270,40 290,55 
     C330,45 370,60 390,110 
     C415,170 415,250 385,310 
     C360,370 310,395 260,390 
     C245,385 205,385 190,390 
     C140,395 90,370 65,310 
     C35,250 35,170 60,110 
     C80,60 120,45 160,55 
     C180,40 210,40 225,55 Z
     
     M160,55 Q180,200 130,375 
     M290,55 Q270,200 320,375 
     M225,55 Q225,200 225,388" fill="rgba(255, 255, 255, 0.4)" stroke="#333" stroke-width="5" stroke-linecap="round"
			stroke-linejoin="round" />

		<path d="M225,40 Q150,150 150,310" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="2" />
		<path d="M225,40 Q300,150 300,310" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="2" />

		<path d="M205,45 Q225,5 245,45 L235,55 L215,55 Z" fill="#5D4037" stroke="#3E2723" stroke-width="2" />

		@for (item of items; track item.id; let i = $index) {
		<g [attr.transform]="'translate(' + item.x + ',' + item.y + ') rotate(' + item.rotation + ')'" class="day-item"
			(click)="updateColor(i)">

			<ellipse cx="0" cy="0" rx="16" ry="13" [attr.fill]="item.color" stroke="#444" stroke-width="1.5" />
			<path d="M0,-13 L0,-16" stroke="#444" stroke-width="1.5" />

			<text y="4" font-size="10" text-anchor="middle" class="day-label">{{ item.id }}</text>
		</g>
		}
	</svg>
</div>
