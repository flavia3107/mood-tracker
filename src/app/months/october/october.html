<div class="october-container">
	<h2>The Spider's Web</h2>

	<div class="mood-picker">
		@for (mood of moods; track mood.label) {
		<div class="mood-item" [style.background]="mood.color" (click)="selectedColor = mood.color"
			[class.active]="selectedColor === mood.color">
		</div>
		}
	</div>

	<svg viewBox="0 0 400 400" class="web-svg">
		<circle cx="200" cy="200" r="180" fill="none" stroke="#444" stroke-width="1" />
		<circle cx="200" cy="200" r="120" fill="none" stroke="#444" stroke-width="1" />
		<circle cx="200" cy="200" r="60" fill="none" stroke="#444" stroke-width="1" />

		@for (seg of segments; track seg.id; let i = $index) {
		<g class="web-slice" (click)="updateDay(i)">
			<path [attr.d]="seg.path" [attr.fill]="seg.color" stroke="#222" stroke-width="1" />
			<text [attr.x]="seg.labelX" [attr.y]="seg.labelY" font-size="8" fill="#888" text-anchor="middle">
				{{ seg.id }}
			</text>
		</g>
		}

		<circle cx="200" cy="200" r="15" fill="#111" />
		<circle cx="200" cy="188" r="8" fill="#111" />
	</svg>
</div>
