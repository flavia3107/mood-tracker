<div class="journal-page">
	<div class="palette">
		@for (mood of moods; track mood.label) {
		<div class="mood-swatch" [style.background]="mood.color" (click)="selectedColor = mood.color"
			[class.active]="selectedColor === mood.color">
		</div>
		}
	</div>

	<svg viewBox="0 0 420 500" class="patch-svg">
		<defs>
			<symbol id="pump-0" viewBox="0 0 50 50">
				<path d="M25,10 C15,10 5,15 5,30 C5,45 15,48 25,48 C35,48 45,45 45,30 C45,15 35,10 25,10"
					stroke-width="2" />
				<path d="M25,5 L25,12" stroke="#5D4037" stroke-width="4" stroke-linecap="round" />
			</symbol>
			<symbol id="pump-1" viewBox="0 0 50 50">
				<path d="M25,5 C18,5 12,15 12,25 C12,35 10,48 25,48 C40,48 38,35 38,25 C38,15 32,5 25,5"
					stroke-width="2" />
				<path d="M25,2 L27,7" stroke="#5D4037" stroke-width="3" stroke-linecap="round" />
			</symbol>
			<symbol id="pump-2" viewBox="0 0 50 50">
				<path d="M25,15 C5,15 2,30 5,40 C10,50 40,50 45,40 C48,30 45,15 25,15" stroke-width="2" />
				<path d="M25,8 L23,16" stroke="#5D4037" stroke-width="4" stroke-linecap="round" />
			</symbol>
		</defs>

		@for (p of pumpkins; track p.id; let i = $index) {
		<g [attr.transform]="'translate('+p.x+','+p.y+') rotate('+p.rotation+') scale('+p.scale+')'"
			class="pumpkin-group" (click)="fillPumpkin(i)">

			<use [attr.href]="'#pump-' + p.type" x="0" y="0" width="45" height="45" [attr.fill]="p.color"
				stroke="#8D6E63" />

			<text x="22" y="35" font-size="10" text-anchor="middle" class="day-label">{{ p.id }}</text>
		</g>
		}
	</svg>
</div>
