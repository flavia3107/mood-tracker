<div class="container">
	<svg viewBox="0 0 500 450" class="pumpkin-svg">
		<defs>
			<mask id="pumpkinMask">
				<path d="M250,100 
						 C320,100 390,120 420,195 
						 C450,290 400,410 300,410 
						 L200,410 
						 C100,410 50,290 80,195 
						 C110,120 180,100 250,100 Z" fill="white" />
			</mask>
		</defs>


		<path d="M230,80 Q250,20 270,80 L260,95 H240 Z" fill="#6d4c41" stroke="#3e2723" stroke-width="2" />

		<g mask="url(#pumpkinMask)">
			<rect width="500" height="450" fill="#FBF8F4" />

			@for (day of days; track day.id) {
			<g (click)="updateDayMood(day)" style="cursor: pointer;">
				<polygon [attr.points]="day.points" [attr.fill]="day.color || '#FBF8F4'" stroke="#3e2723"
					stroke-width="1" />
				<text [attr.x]="day.centerX" [attr.y]="day.centerY" text-anchor="middle" font-size="12"
					font-weight="900" fill="#3e2723" style="pointer-events: none; font-family: sans-serif;">
					{{ day.id }}
				</text>
			</g>
			}
		</g>


		<path
			d="M250,100 C320,100 390,120 420,195 C450,290 400,410 300,410 L200,410 C100,410 50,290 80,195 C110,120 180,100 250,100 Z"
			fill="none" stroke="#3e2723" stroke-width="6" style="pointer-events: none;" />

		<g class="face-overlay" style="pointer-events: none;">
			<path d="M160,190 L210,240 H140 Z" fill="#1a1a1a" />
			<path d="M340,190 L290,240 H360 Z" fill="#1a1a1a" />
			<path
				d="M150,290 C180,340 320,340 350,290 L310,290 L310,310 L280,310 L280,290 L220,290 L220,310 L190,310 L190,290 Z"
				fill="#1a1a1a" />
		</g>
	</svg>
	<div class="legend-container">
		<app-mood-picker (moodColorSelected)="updateMood($event)" />
	</div>
</div>
