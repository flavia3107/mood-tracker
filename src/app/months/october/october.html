<div class="october-canvas">
	<div class="mood-bar">
		@for (mood of moods; track mood.label) {
		<button [style.background]="mood.color" (click)="selectedColor = mood.color"
			[class.active]="selectedColor === mood.color">
		</button>
		}
	</div>

	<svg viewBox="0 0 450 500" class="main-svg">
		<defs>
			<symbol id="ghost-shape" viewBox="0 0 50 60">
				<path
					d="M25,5 C15,5 5,15 5,30 L5,55 L12,50 L19,55 L25,50 L31,55 L38,50 L45,55 L45,30 C45,15 35,5 25,5 Z" />
				<circle cx="18" cy="25" r="3" fill="#333" />
				<circle cx="32" cy="25" r="3" fill="#333" />
			</symbol>
		</defs>

		@for (ghost of ghosts; track ghost.id; let i = $index) {
		<g [attr.transform]="'translate(' + ghost.x + ',' + ghost.y + ') rotate(' + ghost.rotation + ')'"
			class="ghost-group" (click)="updateMood(i)">

			<use href="#ghost-shape" x="0" y="0" width="50" height="60" [attr.fill]="ghost.color" class="ghost-body" />

			<text x="25" y="45" font-size="10" text-anchor="middle" class="ghost-label">
				{{ ghost.id }}
			</text>
		</g>
		}
	</svg>
</div>
