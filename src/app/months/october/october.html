<svg viewBox="0 0 500 450" class="pumpkin-svg svg">
	<path d="M230,80 Q250,20 270,80 L260,95 H240 Z" fill="#6d4c41" stroke="#3e2723" stroke-width="2" />

	@for (day of days; track day.id; let i = $index) {
	<polygon [attr.points]="day.points" [attr.fill]="day.color" (click)="updateDayMood(i)" class="clickable-facet" />

	<text [attr.x]="day.centerX" [attr.y]="day.centerY" class="facet-label">
		{{ day.id }}
	</text>
	}

	<g class="face-overlay">
		<path d="M160,190 L210,240 H140 Z" fill="#1a1a1a" />
		<path d="M340,190 L290,240 H360 Z" fill="#1a1a1a" />
		<path
			d="M150,290 C180,340 320,340 350,290 L310,290 L310,310 L280,310 L280,290 L220,290 L220,310 L190,310 L190,290 Z"
			fill="#1a1a1a" />
	</g>
</svg>

<div class="mood-palette">
	@for (mood of moods; track mood.label) {
	<div class="mood-item" [class.selected]="selectedColor === mood.color" (click)="selectedColor = mood.color">
		<div [style.background]="mood.color" class="swatch"></div>
		<span class="label">{{ mood.label }}</span>
	</div>
	}
</div>
