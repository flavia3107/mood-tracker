<div class="tracker-wrapper">
	<div class="mood-selectors">
		@for (mood of moods; track mood.label) {
		<div class="swatch" [style.background]="mood.color" (click)="selectedColor = mood.color"
			[class.active]="selectedColor === mood.color">
		</div>
		}
	</div>

	<svg viewBox="0 0 420 350" class="glass-pumpkin-svg svg">
		<path d="M210,30 C150,30 60,60 60,160 C60,280 140,310 210,310 C280,310 360,280 360,160 C360,60 270,30 210,30"
			fill="rgba(240, 245, 255, 0.4)" stroke="#444" stroke-width="3" />

		<path d="M210,30 L210,310 M120,55 Q160,160 120,290 M300,55 Q260,160 300,290" fill="none" stroke="#ddd"
			stroke-width="1.5" />

		<path d="M195,30 Q210,0 225,30 Z" fill="#6d4c41" stroke="#3e2723" />

		@for (item of items; track item.id; let i = $index) {
		<g [attr.transform]="'translate(' + item.x + ',' + item.y + ') rotate(' + item.rotation + ')'"
			class="clickable-item" (click)="updateColor(i)">

			<path d="M-15,0 A15,12 0 1,0 15,0 A15,12 0 1,0 -15,0" [attr.fill]="item.color" stroke="#555"
				stroke-width="1.5" />
			<path d="M0,-12 L0,-15" stroke="#555" stroke-width="1.5" />

			<text x="0" y="4" font-size="10" text-anchor="middle" font-family="Arial" class="item-text">
				{{ item.id }}
			</text>
		</g>
		}
	</svg>
</div>
