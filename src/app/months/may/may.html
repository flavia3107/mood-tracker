<svg viewBox="0 0 500 850" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: auto;">
	<defs>
		<path id="petalShape" d="M 0 0 C -11 -7, -7 -15, 0 -12 C 7 -15, 11 -7, 0 0" />

		<symbol id="dayFlower" viewBox="-15 -15 30 30">
			<use href="#petalShape" fill="currentColor" stroke="#F06292" stroke-width="0.3" transform="rotate(0)" />
			<use href="#petalShape" fill="currentColor" stroke="#F06292" stroke-width="0.3" transform="rotate(72)" />
			<use href="#petalShape" fill="currentColor" stroke="#F06292" stroke-width="0.3" transform="rotate(144)" />
			<use href="#petalShape" fill="currentColor" stroke="#F06292" stroke-width="0.3" transform="rotate(216)" />
			<use href="#petalShape" fill="currentColor" stroke="#F06292" stroke-width="0.3" transform="rotate(288)" />
			<circle r="1.8" fill="#C2185B" />
		</symbol>
	</defs>
	@for (f of flowerTrackers; track f.day) {
	<g [attr.transform]="'translate(' + f.x + ',' + f.y + ') scale(' + f.scale + ')'">

		<g [attr.transform]="'rotate(' + f.rotation + ')'">
			<use href="#dayFlower" [attr.color]="getMoodColor(f.day - 1)" width="40" height="40" x="-20" y="-20" />
		</g>

		<text x="18" y="10" font-size="10" font-weight="bold" fill="#5D4037" font-family="sans-serif">
			{{ f.day }}
		</text>
	</g>
	}
</svg>
