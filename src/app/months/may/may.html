<img src="/vecteezy_cherry-blossom-free-vector-background_16808160.jpg" alt="">
<svg viewBox="0 0 220 500" xmlns="http://www.w3.org/2000/svg" class="svg">
	<defs>
		<path id="heartShape" d="M 0 0 C 0 -6, -6 -6, -6 -2 L 0 5 L 6 -2 C 6 -6, 0 -6, 0 0" />

		<path id="petalShape" d="M 0 0 C -11 -7, -7 -15, 0 -12 C 7 -15, 11 -7, 0 0" />
	</defs>
	<g transform="translate(30, 35) scale(0.65)">
		<use href="#petalShape" fill="#FFB7C5" stroke="#F06292" stroke-width="0.2" transform="rotate(0)" />
		<use href="#petalShape" fill="#FADADD" stroke="#F06292" stroke-width="0.2" transform="rotate(72)" />
		<use href="#petalShape" fill="#FFB7C5" stroke="#F06292" stroke-width="0.2" transform="rotate(144)" />
		<use href="#petalShape" fill="#FADADD" stroke="#F06292" stroke-width="0.2" transform="rotate(216)" />
		<use href="#petalShape" fill="#FFB7C5" stroke="#F06292" stroke-width="0.2" transform="rotate(288)" />
		<circle r="2" fill="#C2185B" />
	</g>
	@for (item of trackItems; track item.index) {
	<g [attr.transform]="'translate(' + item.x + ',' + item.y + ')'">
		<use href="#heartShape" [attr.fill]="getMoodColor(item.index - 1)" stroke="#5D4037" stroke-width="0.8" />

		<text x="8" y="-1" font-size="6" fill="#5D4037" font-family="cursive" transform="rotate(-10)">
			{{ item.index }}
		</text>
	</g>
	}
</svg>
