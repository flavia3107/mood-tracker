<div class="flex-column space-between container">
	<svg viewBox="0 0 800 368" xmlns="http://www.w3.org/2000/svg">

		<defs>
			<path id="petalShape" d="M 0 0 C -11 -7, -7 -15, 0 -12 C 7 -15, 11 -7, 0 0" />
			<symbol id="dayFlower" viewBox="-15 -15 30 30">
				<use href="#petalShape" fill="currentColor" stroke="inherit" stroke-width="0.3" transform="rotate(0)" />
				<use href="#petalShape" fill="currentColor" stroke="inherit" stroke-width="0.3"
					transform="rotate(72)" />
				<use href="#petalShape" fill="currentColor" stroke="inherit" stroke-width="0.3"
					transform="rotate(144)" />
				<use href="#petalShape" fill="currentColor" stroke="inherit" stroke-width="0.3"
					transform="rotate(216)" />
				<use href="#petalShape" fill="currentColor" stroke="inherit" stroke-width="0.3"
					transform="rotate(288)" />
				<circle r="2" fill="#FAD4E1" />
			</symbol>
		</defs>

		<rect width="100%" height="100%" fill="url(#dotGrid)" />

		@for (f of flowers; track f.day) {
		<g [attr.transform]="'translate(' + f.x + ',' + f.y + ') scale(' + f.scale + ')'" (click)="onFlowerClick(f)"
			style="cursor: pointer;">

			<g [attr.transform]="'rotate(' + f.rotation + ')'">
				@let stroke = ['#F36D9B', '#D94773', '#eea2bc'].includes(f.color) ? '#f4cfdf' : '#F06292';
				<use href="#dayFlower" [attr.color]="f.color" [attr.stroke]="stroke" width="30" height="30" x="-15"
					y="-15" />
				@let color = ['#F36D9B', '#D94773', '#eea2bc'].includes(f.color) ? '#FEEEF0' : '#5D4037';
				<g [attr.transform]="'rotate(' + (-f.rotation) + ') translate(3, -6)'">
					<text x="0" y="0" dy=".3em" font-size="6" font-weight="900" text-anchor="middle" [attr.fill]="color"
						font-family="cursive" style="pointer-events: none;">
						{{ f.day }}
					</text>
				</g>
			</g>
		</g>
		}
	</svg>
	<div class="legend-container">
		<app-mood-picker (moodColorSelected)="updateMood($event)" />
	</div>
</div>
