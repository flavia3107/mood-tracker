<svg viewBox="-15 -20 220 200" xmlns="http://www.w3.org/2000/svg">
	<g fill="none" stroke="#5D4037" stroke-linecap="round" opacity="0.9">
		<path d="M-10 -10 C 20 10, 50 20, 100 50" stroke-width="3" />
		<path d="M100 50 C 130 70, 150 100, 170 140" stroke-width="1.8" />

		<path d="M30 13 L 60 40" stroke-width="1" />
		<path d="M110 55 L 140 70" stroke-width="1" />
		<path d="M70 45 L 80 85" stroke-width="1" />
		<path d="M120 67 L 120 110" stroke-width="1" />
		<path d="M150 106 L 150 125" stroke-width="1" />
	</g>

	@for (site of flowerSites; track $index) {
	<g>
		@for (pIdx of [0, 1, 2, 3, 4]; track pIdx) {
		<g [attr.transform]="getTransform(site.x, site.y, pIdx)">
			<path class="petal" [attr.d]="'M ' + site.x + ' ' + site.y + 
						 ' C ' + (site.x - 11) + ' ' + (site.y - 7) + ', ' + 
								 (site.x - 7) + ' ' + (site.y - 15) + ', ' + 
								 site.x + ' ' + (site.y - 12) + 
						 ' C ' + (site.x + 7) + ' ' + (site.y - 15) + ', ' + 
								 (site.x + 11) + ' ' + (site.y - 7) + ', ' + 
								 site.x + ' ' + site.y" [attr.fill]="getMoodColor(site.start + pIdx)" stroke="#F06292" stroke-width="0.1" />
		</g>
		}
		<circle [attr.cx]="site.x" [attr.cy]="site.y" r="2" fill="#C2185B" />
		<circle [attr.cx]="site.x" [attr.cy]="site.y" r="0.8" fill="#FFEB3B" />
	</g>
	}

	<g class="falling-petal" transform="translate(60, 160) rotate(-20)">
		<path class="petal" d="M 0 0 C -11 -7, -7 -15, 0 -12 C 7 -15, 11 -7, 0 0" [attr.fill]="getMoodColor(30)"
			stroke="#F06292" stroke-width="0.1" />
	</g>
</svg>
