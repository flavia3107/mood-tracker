<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
	<g fill="none" stroke="#5D4037" stroke-linecap="round">
		<path d="M100 170 Q105 150 100 130" stroke-width="3" />
		<path d="M100 130 C 90 110, 85 90, 85 75" stroke-width="1.5" />
		<path d="M100 130 C 115 110, 125 100, 135 85" stroke-width="1.5" />
		<path d="M85 75 L 70 60" stroke-width="0.8" />
		<path d="M85 100 L 65 105" stroke-width="0.8" />
		<path d="M115 115 L 140 120" stroke-width="0.8" />
		<path d="M135 85 L 155 75" stroke-width="0.8" />
	</g>

	@for (site of flowerSites; track $index) {
	<g>
		@for (pIdx of [0, 1, 2, 3, 4]; track pIdx) {
		<g [attr.transform]="getTransform(site.x, site.y, pIdx)">
			<path class="petal" [attr.d]="'M ' + site.x + ' ' + site.y + 
						 ' C ' + (site.x - 11) + ' ' + (site.y - 7) + ', ' + 
								 (site.x - 7) + ' ' + (site.y - 15) + ', ' + 
								 site.x + ' ' + (site.y - 12) + 
						 ' C ' + (site.x + 7) + ' ' + (site.y - 15) + ', ' + 
								 (site.x + 11) + ' ' + (site.y - 7) + ', ' + 
								 site.x + ' ' + site.y" [attr.fill]="getMoodColor(site.start + pIdx)" stroke="#F06292" stroke-width="0.1" />
		</g>
		}
		<circle [attr.cx]="site.x" [attr.cy]="site.y" r="1.8" fill="#C2185B" />
	</g>
	}

	<g class="falling-petal" transform="translate(130, 165) rotate(45)">
		<path class="petal" d="M 0 0 C -11 -7, -7 -15, 0 -12 C 7 -15, 11 -7, 0 0" [attr.fill]="getMoodColor(30)"
			stroke="#F06292" stroke-width="0.1" />
	</g>
</svg>
