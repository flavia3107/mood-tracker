<div class="flex-column space-between">
	<img src="/vecteezy_cherry-blossom-free-vector-background_16808160.jpg" alt="">
	<svg viewBox="0 0 800 720" xmlns="http://www.w3.org/2000/svg">

		<defs>
			<path id="petalShape" d="M 0 0 C -11 -7, -7 -15, 0 -12 C 7 -15, 11 -7, 0 0" />
			<symbol id="dayFlower" viewBox="-15 -15 30 30">
				<use href="#petalShape" fill="currentColor" stroke="#F06292" stroke-width="0.3" transform="rotate(0)" />
				<use href="#petalShape" fill="currentColor" stroke="#F06292" stroke-width="0.3"
					transform="rotate(72)" />
				<use href="#petalShape" fill="currentColor" stroke="#F06292" stroke-width="0.3"
					transform="rotate(144)" />
				<use href="#petalShape" fill="currentColor" stroke="#F06292" stroke-width="0.3"
					transform="rotate(216)" />
				<use href="#petalShape" fill="currentColor" stroke="#F06292" stroke-width="0.3"
					transform="rotate(288)" />
				<circle r="2" fill="#C2185B" />
			</symbol>
		</defs>

		<pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
			<circle cx="2" cy="2" r="0.5" fill="#ddd" />
		</pattern>
		<rect width="100%" height="100%" fill="url(#dotGrid)" />

		@for (f of flowerTrackers; track f.day) {
		<g [attr.transform]="'translate(' + f.x + ',' + f.y + ') scale(' + f.scale + ')'">

			<g [attr.transform]="'rotate(' + f.rotation + ')'">
				<use href="#dayFlower" [attr.color]="getMoodColor(f.day - 1)" width="30" height="30" x="-15" y="-15" />

				<g [attr.transform]="'rotate(' + (-f.rotation) + ') translate(3, -6)'">
					<text font-size="6" font-weight="900" text-anchor="middle" fill="#5D4037" font-family="cursive">
						{{ f.day }}
					</text>
				</g>
			</g>
		</g>
		}
	</svg>
</div>
