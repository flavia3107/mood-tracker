<svg viewBox="0 0 220 400" xmlns="http://www.w3.org/2000/svg" class="svg">
	<g fill="none" stroke="#5D4037" stroke-linecap="round" opacity="0.9">
		<path d="M-10 -10 C 20 10, 50 20, 100 50" stroke-width="3" />
		<path d="M100 50 C 130 70, 150 100, 170 140" stroke-width="1.8" />

		<path d="M30 13 L 60 40" stroke-width="1" />
		<path d="M110 55 L 140 70" stroke-width="1" />
		<path d="M70 45 L 80 85" stroke-width="1" />
	</g>

	<g transform="translate(60, 40)">
		@for (angle of [0, 72, 144, 216, 288]; track $index) {
		<path d="M 0 0 C -11 -7, -7 -15, 0 -12 C 7 -15, 11 -7, 0 0" fill="#FFB7C5" stroke="#F06292" stroke-width="0.2"
			[attr.transform]="'rotate(' + angle + ')'" />
		}
		<circle r="1.5" fill="#C2185B" />
	</g>

	<g transform="translate(140, 70) scale(0.8)">
		@for (angle of [0, 72, 144, 216, 288]; track $index) {
		<path d="M 0 0 C -11 -7, -7 -15, 0 -12 C 7 -15, 11 -7, 0 0" fill="#FADADD" stroke="#F06292" stroke-width="0.2"
			[attr.transform]="'rotate(' + angle + ')'" />
		}
		<circle r="1.5" fill="#C2185B" />
	</g>

	@for (p of fallingPetals; track p.day) {
	<g [attr.transform]="'translate(' + p.x + ',' + p.y + ') rotate(' + p.rotation + ')'">
		<path d="M 0 0 C -11 -7, -7 -15, 0 -12 C 7 -15, 11 -7, 0 0" [attr.fill]="getMoodColor(p.day - 1)"
			stroke="#5D4037" stroke-width="0.8" />

		<text x="8" y="0" font-size="7" fill="#5D4037" font-family="cursive" transform="rotate(-10)">
			{{ p.day }}
		</text>
	</g>
	}
</svg>
