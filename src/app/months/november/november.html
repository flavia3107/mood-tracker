<div class="tracker-container">
	<h2>November Mood</h2>
	<svg viewBox="0 0 400 400" width="100%" height="100%">
		<path id="scarfPath" d="M 100,300 C 50,200 150,50 300,100 C 400,150 300,300 200,300 L 120,380" fill="none"
			stroke="#ece0d1" stroke-width="42" stroke-linecap="round" />

		@for (day of days; track day) {
		<path d="M 100,300 C 50,200 150,50 300,100 C 400,150 300,300 200,300 L 120,380" fill="none"
			[attr.stroke]="getMoodColor(day)" stroke-width="40"
			[attr.stroke-dasharray]="segmentLength + ' ' + (totalPathLength - segmentLength)"
			[attr.stroke-dashoffset]="-(day * (segmentLength + gap))" class="day-segment" (click)="updateMood(day)" />
		}

		<line x1="115" y1="375" x2="105" y2="395" stroke="#3c2a21" stroke-width="2" />
		<line x1="125" y1="385" x2="115" y2="405" stroke="#3c2a21" stroke-width="2" />
	</svg>

	<div class="legend">
		<p>Click a segment to cycle through cocoa & chocolate tones.</p>
	</div>
</div>
