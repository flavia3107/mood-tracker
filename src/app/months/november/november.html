<div class="tracker-container">
	<svg viewBox="0 0 400 550" width="100%" height="100%">
		<defs>
			<path id="textCurvePath" d="M 110,430 
				   C 110,350 50,300 50,180 
				   C 50,50 350,50 350,180 
				   C 350,300 290,350 290,430" />

			<clipPath id="scarfShapeMask">
				<use xlink:href="#textCurvePath" stroke="white" stroke-width="45" fill="none" />
			</clipPath>

			<linearGradient id="scarfShadow" x1="0%" y1="0%" x2="0%" y2="100%">
				<stop offset="0%" stop-color="#3c2a21" stop-opacity="0" />
				<stop offset="50%" stop-color="#3c2a21" stop-opacity="0.1" />
				<stop offset="100%" stop-color="#3c2a21" stop-opacity="0" />
			</linearGradient>
		</defs>

		<use xlink:href="#textCurvePath" fill="none" stroke="#3c2a21" stroke-width="49" stroke-linecap="round" />
		<use xlink:href="#textCurvePath" fill="none" stroke="#ece0d1" stroke-width="45" stroke-linecap="round" />

		@for (day of days; track day) {
		<use xlink:href="#textCurvePath" fill="none" [attr.stroke]="day.color" stroke-width="45"
			[attr.stroke-dasharray]="segmentLength + ' ' + (totalPathLength - segmentLength)"
			[attr.stroke-dashoffset]="-(day.date * (segmentLength + gap))" (click)="updateDay(day)"
			style="cursor:pointer;" />

		<text font-size="11" fill="#3c2a21" font-family="sans-serif" font-weight="bold" pointer-events="none">
			<textPath xlink:href="#textCurvePath"
				[attr.startOffset]="(day.date * (segmentLength + gap)) + (segmentLength / 2)" text-anchor="middle">
				{{day.date}}
			</textPath>
		</text>
		}

		<use xlink:href="#textCurvePath" fill="none" stroke="#3c2a21" stroke-width="45" opacity="0.2"
			[attr.stroke-dasharray]="'1 ' + (segmentLength + gap - 1)" [attr.stroke-dashoffset]="-gap/2"
			pointer-events="none" />

		<g stroke="#3c2a21" stroke-width="0.8" fill="none" stroke-linecap="round">
			<g transform="translate(110, 430)">
				<path d="M -16,0 C -21,10 -11,20 -16,30" />
				<path d="M -8,0  C -13,10 -3,20 -8,30" />
				<path d="M 0,0   C -5,10 5,20 0,30" />
				<path d="M 8,0   C 3,10 13,20 8,30" />
				<path d="M 16,0  C 11,10 21,20 16,30" />
			</g>
			<g transform="translate(290, 430)">
				<path d="M -16,0 C -21,10 -11,20 -16,30" />
				<path d="M -8,0  C -13,10 -3,20 -8,30" />
				<path d="M 0,0   C -5,10 5,20 0,30" />
				<path d="M 8,0   C 3,10 13,20 8,30" />
				<path d="M 16,0  C 11,10 21,20 16,30" />
			</g>
		</g>
	</svg>

	<div class="legend-container">
		<app-mood-picker (moodColorSelected)="updateMood($event)" />
	</div>
</div>
