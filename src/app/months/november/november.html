<div class="tracker-container">
	<svg viewBox="0 0 500 500" width="100%" height="100%" style="background: #fdfaf7;">
		<defs>
			<path id="scarfShape" d="M 180,380 L 100,300 C 50,200 150,50 300,100 C 420,150 350,350 150,300 L 250,420"
				pathLength="100" />
		</defs>

		<use href="#scarfShape" fill="none" stroke="#ece0d1" stroke-width="50" stroke-linecap="round" />

		@for (day of days; track day) {
		<use href="#scarfShape" fill="none" [attr.stroke]="moods[day]" stroke-width="42"
			[attr.stroke-dasharray]="segmentLength + ' ' + (100 - segmentLength)"
			[attr.stroke-dashoffset]="-(day * (segmentLength + gap))" stroke-linecap="butt" class="day-segment"
			(click)="updateMood(day)" />
		}

		<g stroke="#3c2a21" stroke-width="3" stroke-linecap="round">
			<line x1="250" y1="420" x2="240" y2="450" />
			<line x1="250" y1="420" x2="255" y2="455" />
			<line x1="250" y1="420" x2="270" y2="445" />
		</g>
	</svg>

	<div style="margin-top: 10px;">
		<p>Current Theme: <b>Cocoa & Chocolate</b></p>
	</div>
</div>
