<div class="container-july">
	<svg viewBox="0 0 400 450" class="svg">
		<defs>
			<path id="hex-shape" d="M25 0 L50 14.42 V43.25 L25 57.67 L0 43.25 V14.42 Z" />
		</defs>

		<g transform="translate(50, 50)">
			@for (day of julyDays(); track day.id) {
			<use href="#hex-shape" [attr.x]="day.x" [attr.y]="day.y" [style.fill]="day.moodColor"
				(click)="updateDayMood(day)" stroke="#D4A017" stroke-width="1.5"
				class="transition-all duration-300 hover:brightness-95 cursor-pointer" />
			@let color = day.moodColor === '#4E342E' || day.moodColor === '#8D6E63' ? '#FFF5F6' : '#3E2723';
			<text [attr.x]="day.x + 25" [attr.y]="day.y + 35" font-size="11" font-weight="700" [attr.fill]="color"
				style="pointer-events: none;">
				{{ day.id }}
			</text>
			}
		</g>
	</svg>
	<div class="legend-container">
		<app-mood-picker (moodColorSelected)="updateMood($event)" />
	</div>
</div>
