<svg viewBox="0 0 500 600" class="mood-chart">
	<defs>
		<path id="honey-hex" d="M25 0 L50 14.4 V43.3 L25 57.7 L0 43.3 V14.4 Z" />
	</defs>

	@for (group of julyGroups(); track $index) {
	<g [attr.transform]="'translate(' + ($index * 120 + 50) + ',' + ($index * 150 + 50) + ')'">
		@for (day of group; track day.id) {
		<use href="#honey-hex" [attr.x]="day.x" [attr.y]="day.y" [style.fill]="day.moodColor" stroke="#eab308"
			stroke-width="1" />
		}
	</g>
	}
</svg>
