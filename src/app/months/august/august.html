<div class="container">
	<svg viewBox="0 0 250 250" class="sunflower">
		@for (day of days(); track day.label) {
		<g [attr.transform]="day.groupTransform" (click)="updateDayMood(day)">
			<path d="M125 105 C135 80, 140 40, 125 30 C110 40, 115 80, 125 105 Z" [attr.fill]="day.fill"
				[attr.stroke]="day.stroke" stroke-width="0.5" />
			<text x="125" y="48" text-anchor="middle" font-size="8" font-weight="900" fill="#3E2723"
				[attr.transform]="day.textTransform" style="pointer-events: none; font-family: sans-serif;">
				{{ day.label }}
			</text>
		</g>
		}
		<circle cx="125" cy="125" r="40" fill="#3E2723" />
		<circle cx="125" cy="125" r="35" fill="#5D4037" stroke="#3E2723" stroke-dasharray="2 4" />
	</svg>
	<div class="legend-container">
		<app-mood-picker (moodColorSelected)="updateMood($event)" />
	</div>
</div>
