<svg viewBox="0 0 250 250" class="sunflower svg">
	@for (day of [].constructor(monthData()); track $index) {
	<g [attr.transform]="getRotation($index)">
		<path class="petal" d="M125 105 
			 C135 80, 140 40, 125 30 
			 C110 40, 115 80, 125 105 Z" [attr.fill]="getMoodColor($index)" stroke="#DAA520" stroke-width="0.5" />
	</g>
	}
	<circle cx="125" cy="125" r="40" fill="#3E2723" />
	<circle cx="125" cy="125" r="35" fill="#5D4037" stroke="#3E2723" stroke-dasharray="2 4" />
</svg>
