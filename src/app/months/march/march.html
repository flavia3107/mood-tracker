<div class="tracker-container">
	<svg viewBox="0 0 200 200" class="clover-svg">
		<defs>
			<clipPath id="cloverClip">
				<path
					d="M100,100 C95,90 50,75 50,35 C50,10 75,0 100,25 C125,0 150,10 150,35 C150,75 105,90 100,100 M100,100 C110,95 125,50 165,50 C190,50 200,75 175,100 C200,125 190,150 165,150 C125,150 110,105 100,100 M100,100 C105,110 150,125 150,165 C150,190 125,200 100,175 C75,200 50,190 50,165 C50,125 95,110 100,100 M100,100 C90,105 75,150 35,150 C10,150 0,125 25,100 C0,75 10,50 35,50 C75,50 90,95 100,100 Z" />
			</clipPath>
		</defs>

		<g transform="rotate(45, 100, 100)">
			<path fill="none" stroke="#95a649" stroke-width="2"
				d="M100,100 C95,90 50,75 50,35 C50,10 75,0 100,25 C125,0 150,10 150,35 C150,75 105,90 100,100 M100,100 C110,95 125,50 165,50 C190,50 200,75 175,100 C200,125 190,150 165,150 C125,150 110,105 100,100 M100,100 C105,110 150,125 150,165 C150,190 125,200 100,175 C75,200 50,190 50,165 C50,125 95,110 100,100 M100,100 C90,105 75,150 35,150 C10,150 0,125 25,100 C0,75 10,50 35,50 C75,50 90,95 100,100 Z" />

			<g class="shard-group" clip-path="url(#cloverClip)">
				@for(shard of config; track shard.day){
				<path [attr.d]="shard.path" (click)="updateDay(shard)" [attr.fill]="shard.color" stroke="#95a649"
					stroke-width="0.5" class="shard" />
				<text [attr.x]="shard.x" [attr.y]="shard.y" text-anchor="middle" font-size="5" fill="#111"
					style="pointer-events: none; font-family: sans-serif; font-weight: bold;">
					{{ shard.day }}
				</text>
				}
			</g>
		</g>
	</svg>
	<div class="legend-container">
		<app-mood-picker (moodColorSelected)="updateMood($event)" />
	</div>
</div>
