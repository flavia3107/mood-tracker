<div class="cloud-container" style="width: 50rem; height: 45rem; overflow: hidden; border-radius: 1rem;">
	<svg viewBox="0 0 800 720" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"
		style="width: 100%; height: 100%;" class="shadow-inner">

		<defs>
			<linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
				<stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
				<stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" />
			</linearGradient>

			<filter id="softCloud" x="-20%" y="-20%" width="140%" height="140%">
				<feGaussianBlur in="SourceGraphic" stdDeviation="1.2" />
			</filter>

			<filter id="cloudShadow" x="-20%" y="-20%" width="150%" height="150%">
				<feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e40af" flood-opacity="0.15" />
			</filter>

			<radialGradient id="cloudGrad" cx="50%" cy="40%" r="60%">
				<stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
				<stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
			</radialGradient>

			<g id="real-cloud-shape">
				<path d="M 25,60 
					 C 10,60 10,40 25,40 
					 C 25,20 45,20 55,30 
					 C 65,15 85,15 95,30 
					 C 115,30 115,50 100,60 
					 C 110,75 80,85 65,75 
					 C 50,85 20,80 25,60 Z" />
			</g>
		</defs>

		<rect width="100%" height="100%" fill="url(#skyGradient)" />

		<g>
			@for (cloud of marchClouds(); track cloud.id) {
			<g [attr.transform]="'translate(' + cloud.x + ',' + cloud.y + ') scale(' + cloud.scale + ')'" class="cloud">

				<use href="#real-cloud-shape" fill="#000" filter="url(#cloudShadow)" opacity="0.2" />
				<use href="#real-cloud-shape" fill="url(#cloudGrad)" filter="url(#softCloud)" />

				<text x="62" y="52" text-anchor="middle" font-size="14" font-weight="800" fill="#334155"
					style="pointer-events: none; font-family: system-ui, sans-serif;">
					{{ cloud.id }}
				</text>
			</g>
			}
		</g>
	</svg>
</div>
