<svg viewBox="0 0 500 600" class="w-full h-auto">
	<defs>
		<path id="kite-body" d="M 20 0 L 40 30 L 20 60 L 0 30 Z" />

		<path id="kite-bow" d="M -5 -3 L 5 3 M -5 3 L 5 -3" stroke-width="2" />
	</defs>

	<path d="M 50 100 Q 250 50 450 100" fill="none" stroke="#f0f0f0" stroke-width="2" />
	<path d="M 50 300 Q 250 250 450 300" fill="none" stroke="#f0f0f0" stroke-width="2" />

	@for (day of marchDays(); track day.id) {
	<g [attr.transform]="'translate(' + day.x + ',' + day.y + ') rotate(' + day.rotation + ')'">

		<path d="M 20 60 Q 30 80 20 100 T 20 140" fill="none" stroke="#64748b" stroke-width="1.5" />

		<use href="#kite-bow" x="25" y="85" stroke="#64748b" />
		<use href="#kite-bow" x="15" y="115" stroke="#64748b" />

		<use href="#kite-body" [style.fill]="day.moodColor" stroke="#475569" stroke-width="2"
			class="cursor-pointer transition-colors duration-200" />

		<text x="20" y="35" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b"
			style="pointer-events: none;">
			{{ day.id }}
		</text>
	</g>
	}
</svg>
