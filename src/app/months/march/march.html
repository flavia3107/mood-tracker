<div class="tracker-container">
	<svg viewBox="0 0 400 550" class="clover-svg">
		<defs>
			<clipPath id="heartClip">
				<path d="M50,100 C45,90 0,75 0,35 C0,10 25,0 50,25 C75,0 100,10 100,35 C100,75 55,90 50,100 Z" />
			</clipPath>
		</defs>
		<g transform="rotate(45, 200, 185)">
			@for (leafIdx of [0, 1, 2, 3]; track leafIdx) {
			<g [attr.transform]="getLeafTransform(leafIdx)">
				<g clip-path="url(#heartClip)">
					@for (shardPath of shardPaths; track $index) {
					@let dayIdx = (leafIdx * 8) + $index;
					@let path = dayIdx === 30 ?
					'M60,15 C85,0 100,10 105,35 L90,65 L50,55 Z' :
					shardPath;
					@if (dayIdx < 31) { <g class="shard-group" (click)="updateDay(dayIdx)">
						<path [attr.d]="path" [attr.fill]="days()[dayIdx].color" stroke="#333" stroke-width="0.5"
							class="shard" />
						<text [attr.x]="getLabelPos($index).x" [attr.y]="getLabelPos($index).y" text-anchor="middle"
							font-size="6" fill="#111"
							style="pointer-events: none; font-family: 'Segoe UI', Tahoma, sans-serif; font-weight: bold;">
							{{ dayIdx + 1 }}
						</text>
				</g>
				}
				}
			</g>
			<path d="M50,100 C45,90 0,75 0,35 C0,10 25,0 50,25 C75,0 100,10 100,35 C100,75 55,90 50,100 Z" fill="none"
				stroke="#111" stroke-width="2" />
		</g>
		}
		</g>
	</svg>
	<div class="legend">
		@for (mood of moods; track mood.label) {
		<div class="mood-item" (click)="setMood(mood.color)">
			<div class="swatch" [style.background-color]="mood.color" [class.active]="selectedMood() === mood.color">
			</div>
			<span class="label">{{ mood.label }}</span>
		</div>
		}
	</div>
</div>
