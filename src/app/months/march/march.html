<svg viewBox="0 0 650 750" xmlns="http://www.w3.org/2000/svg" class="w-full h-auto bg-slate-50 rounded-xl shadow-inner">
	<defs>
		<linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
			<stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
		</linearGradient>

		<g id="cloud-shape-fluffy">
			<path
				d="M 10 30 C 10 16 23 5 38 5 C 47 5 56 10 60 18 C 65 14 73 14 78 18 C 84 22 88 30 88 38 C 88 50 81 60 70 60 L 60 60 C 58 64 50 68 40 68 L 30 68 C 18 68 10 60 10 50 Z"
				fill="currentColor" />
		</g>
	</defs>

	<rect width="100%" height="100%" fill="url(#skyGradient)" rx="20" />

	<g transform="translate(25, 25)">
		@for (cloud of marchClouds(); track cloud.id) {
		<g [attr.transform]="'translate(' + cloud.x + ',' + cloud.y + ') scale(' + cloud.scale + ')'"
			[style.color]="cloud.moodColor"
			class="cursor-pointer transition-transform duration-300 hover:brightness-105"
			style="filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));">

			<use href="#cloud-shape-fluffy" stroke="#1e293b" stroke-width="1.8" stroke-linejoin="round" />

			<text x="50" y="42" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a"
				style="pointer-events: none; font-family: sans-serif;">
				{{ cloud.id }}
			</text>
		</g>
		}
	</g>
</svg>
