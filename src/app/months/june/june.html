<div class="container">
	<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">

		<defs>
			<symbol id="thick-leaf" viewBox="-50 -50 100 100">
				<path d="M 0,-45 
					 C -30,-40 -45,-20 -45,5 
					 C -45,25 -20,40 0,45 
					 C 20,40 45,25 45,5 
					 C 45,-20 30,-40 0,-45 Z" stroke="#1B5E20" stroke-width="2.5" />
				<path d="M -15,-5 Q 0,10 15,-5" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="2" />
			</symbol>

			<filter id="leaf-shadow" x="-20%" y="-20%" width="140%" height="140%">
				<feGaussianBlur in="SourceAlpha" stdDeviation="2" />
				<feOffset dx="0" dy="2" result="offsetblur" />
				<feComponentTransfer>
					<feFuncA type="linear" slope="0.3" />
				</feComponentTransfer>
				<feMerge>
					<feMergeNode />
					<feMergeNode in="SourceGraphic" />
				</feMerge>
			</filter>
		</defs>

		<g transform="translate(300, 300)">

			@for (rIdx of [2, 1, 0]; track $index) {
			@let ring = rings[rIdx];

			@for (leafIdx of [].constructor(ring.count); track $index; let lIdx = $index) {

			<g [attr.transform]="'rotate(' + (lIdx * (360/ring.count) + (rIdx * 15)) + ') 
									translate(0, ' + (-ring.radius) + ') 
									scale(' + ring.size + ')'" filter="url(#leaf-shadow)">

				<use xlink:href="#thick-leaf" x="-50" y="-50" width="100" height="100"
					[attr.fill]="getMoodColor(getDayIndex(rIdx, lIdx))" />
			</g>
			}
			}

			<circle r="25" fill="#81C784" stroke="#1B5E20" stroke-width="2" />
		</g>
	</svg>
</div>
