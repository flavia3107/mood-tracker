<div class="container">
	<div class="header">
		<h1>mood tracker</h1>
		<div class="sun-container">
			<svg width="100" height="100">
				<circle cx="50" cy="50" r="40" fill="#FFEB3B" />
				<text x="50" y="55" text-anchor="middle" font-size="8" font-weight="bold">LIVE IN THE SUNSHINE</text>
			</svg>
		</div>
	</div>

	<svg viewBox="0 0 500 600" class="main-svg">
		<path d="M 50 450 Q 250 580 450 450" fill="none" stroke="#2E7D32" stroke-width="25" stroke-linecap="round" />
		<path d="M 65 445 Q 250 560 435 445" fill="none" stroke="#81C784" stroke-width="10" stroke-linecap="round" />

		<g class="mosaic">
			@for (seg of segments; track seg.id) {
			<path [attr.d]="seg.d" [attr.fill]="segmentColors()[$index]" stroke="#333" stroke-width="1.5"
				(click)="setColor($index)" />
			}
		</g>
	</svg>

	<div class="legend">
		@for (mood of moods; track mood.label) {
		<button [style.background]="mood.color" [class.active]="selectedColor() === mood.color"
			(click)="selectedColor.set(mood.color)">
			{{ mood.label }}
		</button>
		}
	</div>
</div>
