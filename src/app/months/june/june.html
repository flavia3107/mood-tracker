<div class="tracker-container">
	<svg viewBox="0 0 500 600">
		<defs>
			<linearGradient id="rindGradient" x1="0%" y1="100%" x2="0%" y2="0%">
				<stop offset="0%" stop-color="#1B5E20" />
				<stop offset="100%" stop-color="#81C784" />
			</linearGradient>

			<clipPath id="wedgeClip">
				<path [attr.d]="wedgePath()" />
			</clipPath>
		</defs>

		<path [attr.d]="wedgePath()" fill="white" stroke="black" stroke-width="2" />
		<path [attr.d]="rindPath()" fill="none" stroke="url(#rindGradient)" stroke-width="70"
			clip-path="url(#wedgeClip)" />

		<!-- <g class="segments">

			<text font-size="8" fill="#666">{{seg?.id}}</text>
			}
		</g> -->
	</svg>
