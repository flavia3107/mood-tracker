<div class="container">
	<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">

		<defs>
			<symbol id="thick-leaf" viewBox="-50 -50 100 100">
				<path d="M 0,-48 
					 C -35,-42 -48,-20 -48,8 
					 C -48,30 -25,45 0,48 
					 C 25,45 48,30 48,8 
					 C 48,-20 35,-42 0,-48 Z" stroke="#1B5E20" stroke-width="2" />
				<path d="M -15,5 Q 0,20 15,5" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="2.5" />
			</symbol>

			<filter id="leaf-shadow" x="-30%" y="-30%" width="160%" height="160%">
				<feGaussianBlur in="SourceAlpha" stdDeviation="2.5" />
				<feOffset dx="0" dy="3" />
				<feComponentTransfer>
					<feFuncA type="linear" slope="0.4" />
				</feComponentTransfer>
				<feMerge>
					<feMergeNode />
					<feMergeNode in="SourceGraphic" />
				</feMerge>
			</filter>
		</defs>

		<g transform="translate(300, 300)">

			@for (rIdx of [5, 4, 3, 2, 1, 0]; track $index) {
			@let ring = rings[rIdx];

			@for (leafIdx of [].constructor(ring.count); track $index; let lIdx = $index) {

			<g [attr.transform]="'rotate(' + (lIdx * (360/ring.count) + (rIdx * 35)) + ') 
									translate(0, ' + (-ring.radius) + ') 
									scale(' + ring.size + ')'" filter="url(#leaf-shadow)">

				<use xlink:href="#thick-leaf" x="-50" y="-50" width="100" height="100"
					[attr.fill]="getMoodColor(getDayIndex(rIdx, lIdx))" class="leaf-element" />
			</g>
			}
			}

			<circle r="22" fill="#81C784" stroke="#1B5E20" stroke-width="2" />
		</g>
	</svg>
</div>
