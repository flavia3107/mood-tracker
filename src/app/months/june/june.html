<div class="tracker-wrapper">
	<svg viewBox="0 0 500 600">
		<text x="250" y="60" text-anchor="middle" class="title">mood tracker</text>

		<circle cx="410" cy="110" r="45" fill="#FFEB3B" />
		<text x="410" y="115" text-anchor="middle" font-size="10" font-weight="bold">LIVE IN THE SUNSHINE</text>

		<path d="M 50 480 Q 250 590 450 480" stroke="#2E7D32" stroke-width="20" fill="none" />

		<g class="watermelon-meat">
			@for (seg of segments(); track seg.id) {
			<polygon [attr.points]="seg.points" [attr.fill]="filledSegments().get(seg.id) || '#fff'" stroke="#444"
				stroke-width="0.5" (click)="updateColor(seg.id)" />
			}
		</g>
	</svg>

	<div class="legend">
		@for (mood of moods; track mood.label) {
		<button [style.background-color]="mood.color" [class.active]="selectedColor() === mood.color"
			(click)="selectedColor.set(mood.color)">
			{{ mood.label }}
		</button>
		}
	</div>
</div>
