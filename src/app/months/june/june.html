<div class="june-container">
	@for (unit of iceCreams(); track unit.id) {
	<div class="ice-cream-unit" [style.left.rem]="unit.x" [style.top.rem]="unit.y" [style.--r]="unit.rotation + 'deg'"
		[style.transform]="'rotate(' + unit.rotation + 'deg)'">

		<svg class="cone" width="60" height="80" viewBox="0 0 40 60">
			<path d="M0,0 L40,0 L20,60 Z" fill="#D2B48C" stroke="#8B4513" stroke-width="2" />
			<path d="M10,0 L25,45 M20,0 L30,30 M0,10 L35,25" stroke="#8B4513" stroke-width="0.5" opacity="0.3" />
		</svg>

		@for (scoop of unit.scoops; track scoop.day) {
		<div class="scoop-wrapper" [style.bottom.px]="62" [style.z-index]="10" (click)="colorScoop(unit, $index)">

			<svg width="80" height="70" viewBox="2 0 55 40">
				<path [attr.fill]="scoop.color || '#FFF9F0'" stroke="#E6D5C3" stroke-width="1.5"
					d="M10,30 Q10,5 30,5 Q50,5 50,30 Q50,40 40,40 Q30,35 25,40 Q20,35 15,40 Q10,40 10,30 Z" />
				<text x="30" y="26" text-anchor="middle" fill="#8B4513" font-size="10" font-weight="bold"
					style="pointer-events: none; user-select: none; font-family: sans-serif;">
					{{ scoop.day }}
				</text>
				<g class="sprinkles" opacity="0.4">
					<rect x="20" y="15" width="5" height="2" rx="1" fill="#FF6B6B" transform="rotate(30 20 15)" />
					<rect x="35" y="18" width="5" height="2" rx="1" fill="#4ECDC4" transform="rotate(-15 35 18)" />
					<rect x="25" y="25" width="5" height="2" rx="1" fill="#FFE66D" transform="rotate(45 25 25)" />
				</g>
			</svg>
		</div>
		}
	</div>
	}
</div>
