<div class="container flex-row">
	<svg viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">
		<defs>
			<clipPath id="wedgeClip">
				<path [attr.d]="wedgePath()" />
			</clipPath>
		</defs>

		<path [attr.d]="wedgePath()" fill="#fff" stroke="#000" stroke-width="1.5" stroke-linejoin="round" />

		<g class="segments" clip-path="url(#wedgeClip)">
			@for (seg of segments; track seg.id) {
			<path [attr.d]="seg.d" [attr.fill]="seg['color']" stroke="black" stroke-width="1" (click)="updateDay(seg)"
				class="clickable-segment" />

			<text [attr.x]="seg.x" [attr.y]="seg.y" fill="black" font-size="10" text-anchor="middle"
				dominant-baseline="middle" pointer-events="none" class="umbrella-label">
				{{ seg.id }}
			</text>
			}
		</g>
		<g clip-path="url(#wedgeClip)">
			<path [attr.d]="rindPathBase()" fill="none" stroke="#81C784" stroke-width="80" stroke-linecap="round" />
			<path [attr.d]="rindPathMid()" fill="none" stroke="#2E7D32" stroke-width="65" stroke-linecap="round"
				opacity="0.7" />
			<path [attr.d]="rindPathOuter()" fill="none" stroke="#1B5E20" stroke-width="35" stroke-linecap="round"
				opacity="0.4" />
		</g>
	</svg>
	<div class="legend-container">
		<app-mood-picker (moodColorSelected)="updateMood($event)" />
	</div>
</div>
