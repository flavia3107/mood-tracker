<div class="container" [ngClass]="currentMonth() | lowercase">
	<ng-container [ngTemplateOutlet]="activeTemplate()" [ngTemplateOutletContext]="{ $implicit: moodLogic }">
	</ng-container>
</div>

<ng-template #january let-m>
	<app-january />
</ng-template>
<ng-template #february let-m>
	<app-february />
</ng-template>
<ng-template #march let-m>
	<app-march />
</ng-template>
<ng-template #april let-m>
	<svg viewBox="0 0 400 600" class="april-svg" xmlns="http://www.w3.org/2000/svg">
		<defs>
			<clipPath id="umbrella-mask">
				<path d="M180,70 
				C240,65 280,80 310,110 
				C340,140 375,190 375,275 
				Q340,285 300,300 
				L200,315 L100,300 
				Q60,285 25,275 
				C25,190 60,140 90,110 
				C120,80 160,65 220,70 Z" />
			</clipPath>
		</defs>

		<path d=" M200,280 L200,430" stroke="#7c7c88" stroke-width="4" fill="none" stroke-linecap="round" />
		<path d="M200,435 Q200,500 155,465" stroke="#8d7762" stroke-width="6" fill="none" stroke-linecap="round" />

		<g clip-path="url(#umbrella-mask)">
			@for (section of m.days; track $index) {
			<g (click)="m.updateMood(section)" class="shard-group">
				<path [attr.d]="section.path" [attr.fill]="section.color" opacity="1" />
				<text class="umbrella-label" [attr.x]="section.label.x" [attr.y]="section.label.y"
					[attr.transform]="'rotate(-80 ' + section.label.x + ' ' + section.label.y + ')'">
					{{ $index + 1 }}
				</text>
			</g>
			}
		</g>

		<path d="M180,70 
		C240,65 280,80 310,110 
		C340,140 375,190 375,275 
		Q340,285 300,300 
		L200,315 L100,300 
		Q60,285 25,275 
		C25,190 60,140 90,110 
		C120,80 160,65 220,70 Z" fill="none" stroke="#d3d3d3" stroke-width="1.5" stroke-linecap="round"
			stroke-linejoin="round" />
	</svg>
	<div class="legend-container">
		<app-mood-picker (moodColorSelected)="m.getColor($event)" />
	</div>
</ng-template>
<ng-template #may let-m>
	<app-may />
</ng-template>
<ng-template #june let-m>
	<app-june />
</ng-template>
<ng-template #july let-m>
	<app-july />
</ng-template>
<ng-template #august let-m>
	<div class="legend-container">
		<app-mood-picker (moodColorSelected)="m.getColor($event)" />
	</div>
	<svg viewBox="0 0 250 250" class="sunflower">
		<defs>
			<mask id="petalMask">
				<path d="M125 105 C135 80, 140 40, 125 30 C110 40, 115 80, 125 105 Z" fill="white" />
			</mask>
		</defs>

		@for (day of m.days; track day.label) {
		<g [attr.transform]="day.groupTransform" (click)="m.updateMood(day)" style="cursor: pointer;">
			<path d="M125 105 C135 80, 140 40, 125 30 C110 40, 115 80, 125 105 Z" [attr.fill]="day.color"
				[attr.stroke]="day.stroke" stroke-width="0.7" />
			<g mask="url(#petalMask)" opacity="0.3" [attr.fill]="day.stroke">
				<path d="M125 105 C132 85, 130 50, 125 45 C120 50, 118 85, 125 105 Z" />
			</g>
			@let textFill = ['#F57C00', '#BF360C'].includes(day.color) ? '#FFF59D' : '#3E2723';
			<text x="125" y="48" text-anchor="middle" font-size="8" font-weight="900" [attr.fill]="textFill"
				[attr.transform]="day.textTransform" style="pointer-events: none; font-family: sans-serif;">
				{{ day.label }}
			</text>
		</g>
		}
		<circle cx="125" cy="125" r="40" fill="#3E2723" />
		<circle cx="125" cy="125" r="35" fill="#422426" stroke="#232323" stroke-width="2" stroke-dasharray="1 3" />
		<circle cx="125" cy="125" r="32" fill="none" stroke="#232323" stroke-opacity="0.2" stroke-width="1" />
	</svg>
</ng-template>
<ng-template #september let-m>
	<app-september />
</ng-template>
<ng-template #october let-m>
	<app-october />
</ng-template>
<ng-template #november let-m>
	<app-november />
</ng-template>
<ng-template #december let-m>
	<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
		@for (d of m.days; track $index;) {
		<g class="bulb" [class.brightness]="d.color !== '#fff'" [attr.transform]="'translate(' + d.x + ',' + d.y + ')'"
			(click)="m.updateMood(d)">
			<circle cx="0" cy="0" r="5" [attr.fill]="d.color" />
			<rect x="-1" y="-6.2" width="2" height="2" fill="#333" />
			<text class="label" [class.lightText]="['#840627', '#af142e', '#e0464f'].includes(d.color)" x="0" y="0"
				text-anchor="middle" dy=".35em">
				{{$index + 1}}
			</text>
		</g>
		}
	</svg>
	<div class="legend-container">
		<app-mood-picker (moodColorSelected)="m.getColor($event)" />
	</div>
</ng-template>
