<div class="month-container">
	{{currentMonth}}
	@switch (currentMonth) {
	@case (0) {
	<app-january />
	}
	@case (1) {
	<app-february />
	}
	@case (2) {
	<app-march />
	}
	@case (3) {
	<app-april />
	} @case (4) {
	<app-may />
	}
	@case (5) {
	<app-june />
	} @case (6) {
	<app-july />
	}
	@case (7) {
	<app-august />
	}
	@case (8) {
	<app-september />
	}
	@case (9) {
	<app-october />
	}
	@case (10) {
	<app-november />
	}
	@case (11) {
	<app-december />
	}
	}
</div>
