<div class="month-container flex-row center middle svg-container">
	{{currentMonth()}}
	@switch (currentMonth()) {
	@case ('1') {
	<app-january /> }
	@case ('2') {
	<app-february /> }
	@case ('3') {
	<app-march /> }
	@case ('4') {
	<app-april /> }
	@case ('5') {
	<app-may /> }
	@case ('6') {
	<app-june /> }
	@case ('7') {
	<app-july /> }
	@case ('8') {
	<app-august /> }
	@case ('9') {
	<app-september /> }
	@case ('10') {
	<app-october /> }
	@case ('11') {
	<app-november /> }
	@case ('12') {
	<app-december /> }
	}
</div>
