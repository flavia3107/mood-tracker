<div class="calendar-container">
	<div class="navigation flex-row middle">
		<span>{{selected() | date: 'MMMM yyyy'}} </span>
		<div class="navigation-buttons-container flex-row">
			<mat-icon matTooltip="Previous Month" (click)="updateCurrentMonth(-1)">navigate_before</mat-icon>
			<mat-icon matTooltip="Next Month" (click)="updateCurrentMonth(1)">navigate_next</mat-icon>
		</div>
	</div>
	<div class="calendar-body days">
		@for(dayName of days; track $index){
		<p class="calendar-dayName">{{dayName[0]}}</p>
		}
	</div>
	<div class="calendar-body">
		@for(day of calendarDays(); track $index){
		<p class="calendar-day flex-row center middle" [ngClass]="{
				'outside-month': +(day | date:'M')! !== (currentDay!.getMonth() + 1),
				'sunday':(day | date:'EEE') === 'Sun',
				'today': ((day | date:'yyyy-MM-dd') === (selected() | date:'yyyy-MM-dd'))
				}">{{day | date:'d'}}</p>
		}
	</div>
</div>
